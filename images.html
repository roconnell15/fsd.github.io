<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8f5e8; /* Light green background */
            margin: 0;
            padding: 0;
            color: #2e7d32; /* Dark green text */
        }
        nav {
            background-color: #4caf50; /* Medium green */
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        nav a:hover {
            background-color: #388e3c; /* Darker green on hover */
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 20px;
        }
        .gallery img {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <div class="gallery">
        <img alt="describes the image" src="assets/IMG_5618.jpg" onclick="openModal(this.src)">
        <img alt="describes the image" src="assets/flower.jpg" onclick="openModal(this.src)">
        <img alt="describes the image" src="assets/flower.jpg" onclick="openModal(this.src)">
        <img alt="describes the image" src="assets/name.JPG" onclick="openModal(this.src)">
        <img alt="describes the image" src="assets/imagetoupload.png" onclick="openModal(this.src)">
        <img alt="describes the image" src="assets/flower.jpg" onclick="openModal(this.src)">
    </div>
    <div class="modal" id="modal" onclick="closeModal()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="fullImage" src="" alt="Full size image">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('fullImage').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
